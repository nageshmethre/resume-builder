<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Builder - Resume Builder</title>
    <!-- Fonts & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Workspace Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid px-4">
            <a class="btn btn-outline-light btn-sm me-3" href="/dashboard.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                </svg>
                Back to Dashboard
            </a>
            <span class="navbar-brand fw-bold me-auto">Resume Workspace</span>
            <div class="d-flex">
                <button class="btn btn-success me-2 fw-semibold px-4" id="save-btn">
                    Save Changes
                </button>
                <button class="btn btn-primary fw-semibold px-4 d-none" id="pdf-btn">
                    Download PDF
                </button>
            </div>
        </div>
    </nav>

    <!-- Workspace Area -->
    <div class="container-fluid px-0">
        <div class="row g-0 workspace-container">
            
            <!-- Left Column: Form Editor -->
            <div class="col-lg-6 form-editor border-end">
                <div class="container-fluid py-2">
                    <div id="alert-box" class="alert alert-danger d-none" role="alert"></div>
                    <div id="success-box" class="alert alert-success d-none" role="alert"></div>

                    <!-- Resume Metadata -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <h5 class="fw-bold mb-3 text-secondary">Document Metadata</h5>
                        <div class="mb-3">
                            <label for="title" class="form-label">Resume Title / Document Name</label>
                            <input type="text" class="form-control" id="title" required placeholder="E.g., Software Engineer Resume 2026">
                        </div>
                    </div>

                    <!-- Personal Info -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <h5 class="fw-bold mb-3 text-secondary">Personal Information</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstName" required placeholder="John">
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastName" required placeholder="Doe">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required placeholder="john.doe@example.com">
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" placeholder="+1 (555) 019-2834">
                            </div>
                            <div class="col-12">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" placeholder="San Francisco, CA">
                            </div>
                        </div>
                    </div>

                    <!-- Summary -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <h5 class="fw-bold mb-3 text-secondary">Professional Summary</h5>
                        <div class="mb-3">
                            <textarea class="form-control" id="summary" rows="4" placeholder="Briefly describe your career objectives, domain expertise, and core strengths..."></textarea>
                        </div>
                    </div>

                    <!-- Work Experience -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-secondary">Work Experience</h5>
                            <button type="button" class="btn btn-outline-primary btn-sm fw-semibold" id="add-exp-btn">+ Add Experience</button>
                        </div>
                        <div id="experience-list" class="accordion">
                            <!-- Experience Items render here -->
                        </div>
                    </div>

                    <!-- Education -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-secondary">Education</h5>
                            <button type="button" class="btn btn-outline-primary btn-sm fw-semibold" id="add-edu-btn">+ Add Education</button>
                        </div>
                        <div id="education-list" class="accordion">
                            <!-- Education Items render here -->
                        </div>
                    </div>

                    <!-- Projects -->
                    <div class="card p-3 mb-4 border-0 shadow-sm">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-secondary">Projects</h5>
                            <button type="button" class="btn btn-outline-primary btn-sm fw-semibold" id="add-proj-btn">+ Add Project</button>
                        </div>
                        <div id="projects-list" class="accordion">
                            <!-- Projects Items render here -->
                        </div>
                    </div>

                     <!-- Skills -->
                     <div class="card p-3 mb-4 border-0 shadow-sm">
                         <div class="d-flex justify-content-between align-items-center mb-3">
                             <h5 class="fw-bold mb-0 text-secondary">Skills</h5>
                             <button type="button" class="btn btn-outline-primary btn-sm fw-semibold" id="add-skill-btn">+ Add Skill</button>
                         </div>
                         <div id="skills-list" class="row g-2">
                             <!-- Skills items render here -->
                         </div>
                     </div>

<!-- Certifications -->
                      <div class="card p-3 mb-4 border-0 shadow-sm">
                          <div class="d-flex justify-content-between align-items-center mb-3">
                              <h5 class="fw-bold mb-0 text-secondary">Certifications</h5>
                              <button type="button" class="btn btn-outline-primary btn-sm fw-semibold" id="add-cert-btn">+ Add Certification</button>
                          </div>
<div id="certifications-list" class="row g-2">
                               <!-- Certification items render here -->
                           </div>
                       </div>

                 </div>
             </div>

            <!-- Right Column: Live Preview -->
            <div class="col-lg-6 preview-pane d-none d-lg-block">
                <div class="resume-paper" id="resume-preview">
                    <!-- Dynamic live review maps here -->
                    <div class="text-center py-5 text-muted">
                        Fill in forms on the left to populate the preview.
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JS dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/builder.js"></script>
</body>
</html>
